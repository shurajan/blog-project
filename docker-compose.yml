services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - blog-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 1s
      timeout: 5s
      retries: 10

volumes:
  blog-pgdata: